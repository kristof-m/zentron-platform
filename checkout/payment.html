<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" type="text/css" href="/checkout/payment.css" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="zentron checkout payment page" />
        <title>zentron - checkout payment</title>
    </head>

    <body class="checkout-page">
        <header class="checkout-header">
            <div class="checkout-header-inner">
                <a class="home-link" href="/">
                    <h1>zentron</h1>
                </a>

                <nav class="checkout-nav" aria-label="Checkout navigation">
                    <a class="black-link is-active" href="/categories"
                        >Categories</a
                    >
                    <a class="black-link" href="#" aria-label="placeholder link"
                        >Placeholder</a
                    >
                    <a class="black-link" href="#" aria-label="placeholder link"
                        >Placeholder</a
                    >
                    <a class="black-link" href="#" aria-label="placeholder link"
                        >Placeholder</a
                    >
                </nav>

                <div class="checkout-tools">
                    <label
                        class="checkout-search"
                        for="checkout-payment-search"
                    >
                        <input
                            id="checkout-payment-search"
                            type="search"
                            placeholder="Search"
                            aria-label="Search products"
                        />
                        <svg
                            class="search-icon"
                            viewBox="0 0 24 24"
                            aria-hidden="true"
                            focusable="false"
                        >
                            <circle cx="11" cy="11" r="7" />
                            <line x1="16.5" y1="16.5" x2="21" y2="21" />
                        </svg>
                    </label>

                    <a class="icon-button" href="/cart" aria-label="Open cart">
                        <svg
                            viewBox="0 0 24 24"
                            aria-hidden="true"
                            focusable="false"
                        >
                            <path d="M3 4h2l2 11h11l2-8H7" />
                            <circle cx="10" cy="19" r="1.5" />
                            <circle cx="17" cy="19" r="1.5" />
                        </svg>
                    </a>
                </div>
            </div>
        </header>

        <section class="checkout-steps" aria-label="Checkout steps">
            <ol class="checkout-stepper">
                <li class="step-item is-complete">
                    <span class="step-index" aria-hidden="true">1</span>
                    <span class="step-label">Shipping</span>
                </li>
                <li class="step-item is-complete">
                    <span class="step-index" aria-hidden="true">2</span>
                    <span class="step-label">Review</span>
                </li>
                <li class="step-item is-active" aria-current="step">
                    <span class="step-index" aria-hidden="true">3</span>
                    <span class="step-label">Payment</span>
                </li>
            </ol>
        </section>

        <main class="checkout-main">
            <section
                class="checkout-layout"
                aria-label="Checkout payment layout"
            >
                <section
                    class="checkout-form-box payment-box"
                    aria-label="Payment section"
                >
                    <h2>Payment method</h2>

                    <form class="payment-form" action="#" method="post">
                        <fieldset
                            class="payment-methods"
                            aria-label="Payment method selector"
                        >
                            <label class="payment-option">
                                <input type="radio" name="payment-method" />
                                <span>Google Pay</span>
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment-method" />
                                <span>Apple Pay</span>
                            </label>
                            <label class="payment-option">
                                <input
                                    type="radio"
                                    name="payment-method"
                                    checked
                                />
                                <span>Credit/Debit Card</span>
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment-method" />
                                <span>Bank transfer</span>
                            </label>
                        </fieldset>

                        <label for="card-no">Card No:</label>
                        <input
                            id="card-no"
                            name="card-no"
                            type="text"
                            placeholder="0000 0000 0000 0000"
                        />

                        <div class="payment-row payment-row-split">
                            <div>
                                <label for="card-cvc">CVC:</label>
                                <input
                                    id="card-cvc"
                                    name="card-cvc"
                                    type="text"
                                    placeholder="123"
                                />
                            </div>
                            <div>
                                <label for="card-exp">Expires:</label>
                                <input
                                    id="card-exp"
                                    name="card-exp"
                                    type="text"
                                    placeholder="MM / YY"
                                />
                            </div>
                        </div>
                    </form>
                </section>

                <aside class="checkout-summary" aria-label="Order summary">
                    <h2>Order summary</h2>

                    <div class="summary-lines">
                        <p><span>Subtotal</span><span>999 EUR</span></p>
                        <p><span>Delivery</span><span>6 EUR</span></p>
                        <p><span>Tax</span><span>199 EUR</span></p>
                    </div>

                    <p class="summary-total">Total cost 1204 EUR</p>

                    <button
                        type="button"
                        class="checkout-btn checkout-btn-primary"
                    >
                        Confirm
                    </button>
                    <button type="button" class="checkout-btn">Go back</button>
                </aside>
            </section>
        </main>
        <footer></footer>
    </body>
</html>
