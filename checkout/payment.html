<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" type="text/css" href="/checkout/payment.css" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="zentron checkout payment page" />
        <title>zentron - checkout payment</title>
    </head>

    <body class="checkout-page">
        <header>
            <a class="home-link" href="/">
                <h1>zentron</h1>
            </a>

            <nav class="desktop-nav no-mobile" aria-label="Main navigation">
                <a class="black-link" href="/categories">Categories</a>
                <a class="black-link" href="#">Placeholder</a>
                <a class="black-link" href="#">Placeholder</a>
                <a class="black-link" href="#">Placeholder</a>
            </nav>

            <div class="spacer" aria-hidden="true"></div>

            <div class="header-tools">
                <label class="search-box" for="login-search">
                    <input
                        id="login-search"
                        type="search"
                        placeholder="Search"
                        aria-label="Search products"
                    />
                    <svg
                        class="search-icon"
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                        focusable="false"
                    >
                        <circle cx="11" cy="11" r="7" />
                        <line x1="16.5" y1="16.5" x2="21" y2="21" />
                    </svg>
                </label>

                <a
                    class="icon-button no-mobile"
                    href="/cart"
                    aria-label="Open cart"
                >
                    <svg
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                        focusable="false"
                    >
                        <path d="M3 4h2l2 11h11l2-8H7" />
                        <circle cx="10" cy="19" r="1.5" />
                        <circle cx="17" cy="19" r="1.5" />
                    </svg>
                </a>

                <a href="/login" class="black-link no-mobile">Sign in</a>
            </div>
        </header>

        <section class="checkout-steps" aria-label="Checkout steps">
            <ol class="checkout-stepper">
                <li class="step-item is-complete">
                    <span class="step-index" aria-hidden="true">1</span>
                    <span class="step-label">Shipping</span>
                </li>
                <li class="step-item is-complete">
                    <span class="step-index" aria-hidden="true">2</span>
                    <span class="step-label">Review</span>
                </li>
                <li class="step-item is-active" aria-current="step">
                    <span class="step-index" aria-hidden="true">3</span>
                    <span class="step-label">Payment</span>
                </li>
            </ol>
        </section>

        <main class="checkout-main">
            <section
                class="checkout-layout"
                aria-label="Checkout payment layout"
            >
                <section
                    class="checkout-form-box payment-box"
                    aria-label="Payment section"
                >
                    <h2>Payment method</h2>

                    <form class="payment-form" action="#" method="post">
                        <fieldset
                            class="payment-methods"
                            aria-label="Payment method selector"
                        >
                            <label class="payment-option">
                                <input type="radio" name="payment-method" />
                                <span>Google Pay</span>
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment-method" />
                                <span>Apple Pay</span>
                            </label>
                            <label class="payment-option">
                                <input
                                    type="radio"
                                    name="payment-method"
                                    checked
                                />
                                <span>Credit/Debit Card</span>
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment-method" />
                                <span>Bank transfer</span>
                            </label>
                        </fieldset>

                        <label for="card-no">Card No:</label>
                        <input
                            id="card-no"
                            name="card-no"
                            type="text"
                            placeholder="0000 0000 0000 0000"
                            autocomplete="cc-number"
                        />

                        <div class="payment-row payment-row-split">
                            <div>
                                <label for="card-cvc">CVC:</label>
                                <input
                                    id="card-cvc"
                                    name="card-cvc"
                                    type="text"
                                    placeholder="123"
                                    autocomplete="cc-csc"
                                />
                            </div>
                            <div>
                                <label for="card-exp">Expires:</label>
                                <input
                                    id="card-exp"
                                    name="card-exp"
                                    type="text"
                                    placeholder="MM / YY"
                                    autocomplete="cc-exp"
                                />
                            </div>
                        </div>
                    </form>
                </section>

                <aside class="checkout-summary" aria-label="Order summary">
                    <h2>Order summary</h2>

                    <p class="price-row">
                        <span>Subtotal</span><span>999 EUR</span>
                    </p>
                    <p class="price-row">
                        <span>Delivery</span><span>6 EUR</span>
                    </p>
                    <p class="price-row">
                        <span>Tax</span><span>199 EUR</span>
                    </p>

                    <p class="price-row total-price">
                        <span>Total:</span><span>1204 EUR</span>
                    </p>

                    <div class="checkout-link">
                        <a href="/checkout/completion">Confirm</a>
                    </div>

                    <div class="checkout-link">
                        <a href="/checkout/review">Go back</a>
                    </div>
                </aside>
            </section>
        </main>
        <footer></footer>
    </body>
</html>
