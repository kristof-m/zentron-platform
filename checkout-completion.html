<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" type="text/css" href="checkout-completion.css" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="zentron checkout completion page" />
        <title>zentron - checkout completion</title>
    </head>

    <body class="checkout-page">
        <header class="checkout-header">
            <div class="checkout-header-inner">
                <a class="home-link" href="/">
                    <h1>zentron</h1>
                </a>

                <span class="nav-placeholder" aria-hidden="true"></span>

                <nav class="checkout-nav" aria-label="Checkout navigation">
                    <a class="black-link is-active" href="/categories">Categories</a>
                    <a class="black-link" href="#" aria-label="placeholder link">Placeholder</a>
                    <a class="black-link" href="#" aria-label="placeholder link">Placeholder</a>
                    <a class="black-link" href="#" aria-label="placeholder link">Placeholder</a>
                </nav>

                <div class="checkout-tools">
                    <label class="checkout-search" for="checkout-completion-search">
                        <input
                            id="checkout-completion-search"
                            type="search"
                            placeholder="Search"
                            aria-label="Search products"
                        />
                        <svg
                            class="search-icon"
                            viewBox="0 0 24 24"
                            aria-hidden="true"
                            focusable="false"
                        >
                            <circle cx="11" cy="11" r="7" />
                            <line x1="16.5" y1="16.5" x2="21" y2="21" />
                        </svg>
                    </label>

                    <a class="icon-button" href="/cart" aria-label="Open cart">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M3 4h2l2 11h11l2-8H7" />
                            <circle cx="10" cy="19" r="1.5" />
                            <circle cx="17" cy="19" r="1.5" />
                        </svg>
                    </a>
                </div>
            </div>
        </header>

        <section class="checkout-page-heading" aria-label="Checkout page title">
            <h2>checkout [completion]</h2>
        </section>

        <main></main>
        <footer></footer>
    </body>
</html>
